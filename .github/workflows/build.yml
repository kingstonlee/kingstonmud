name: build

# Compile the MUD server and syntax-check the world data on every push and PR.
# This is the one automated safety net the engine realistically has: it catches
# build breakage and malformed world files before they reach a running game.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Configure
        run: ./configure

      - name: Compile
        run: make -C src

      - name: Verify binary was produced
        run: test -x bin/circle

      - name: Syntax-check the world data
        run: |
          # Ensure runtime directories exist (contents are gitignored).
          mkdir -p lib/etc lib/plrfiles lib/plrobjs lib/plrvars log
          bin/circle -c
